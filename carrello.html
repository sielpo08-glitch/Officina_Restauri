<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Tuo Carrello | Officina Restauri</title>
    <link rel="stylesheet" href="style_index.css">
    <style>
    body { background-color: #fdf2e9; } /* Uniforme all'index */
    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    .carrello-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
    .item-list { background: #fefaf6; border-radius: 0; padding: 25px; border: 1px solid rgba(230, 126, 34, 0.2); }
    .item { border-bottom: 1px solid #edccaf; padding: 20px 0; }
    .summary { background: #2c3e50; color: white; padding: 30px; border-radius: 0; }
    .summary h3 { color: #e67e22; border-bottom: 1px solid #e67e22; margin-bottom: 20px; padding-bottom: 10px; }
    .grand-total { color: #e67e22; font-size: 1.8rem; border-top: 1px solid #e67e22; padding-top: 20px; }
    .btn-aggiungi-carrello { background: #e67e22; color: #2c3e50; }
    .btn-aggiungi-carrello:hover { background: #d35400; color: white; }
    .remove-btn { color: #e67e22; }
</style>
</head>
<body>
    <nav class="navbar">
        <h1>IL TUO <b>CARRELLO</b></h1>
        <a href="index.html">← Torna allo Shop</a>
    </nav>

    <div class="container">
        <div id="carrello-vuoto" style="display:none; text-align:center; padding: 50px;">
            <h2>Il carrello è vuoto 📦</h2>
            <p>Non hai ancora scelto nessun tesoro vintage.</p>
        </div>

        <div id="carrello-pieno" class="carrello-grid">
            <div class="item-list" id="lista-articoli"></div>
            <div class="summary">
                <h3>Riepilogo</h3>
                <div class="total-row"><span>Articoli:</span> <span id="sub-tot">€0.00</span></div>
                <div class="total-row"><span>Spedizione:</span> <span>€9.99</span></div>
                <div class="total-row grand-total"><span>Totale:</span> <span id="tot-finale">€0.00</span></div>
                <button class="btn-aggiungi-carrello" style="margin-top:20px" onclick="checkout()">CONFERMA ORDINE</button>
            </div>
        </div>
    </div>

    <script>
        function render() {
            const carrello = JSON.parse(localStorage.getItem('carrello')) || [];
            const containerPieno = document.getElementById('carrello-pieno');
            const containerVuoto = document.getElementById('carrello-vuoto');
            
            if(carrello.length === 0) {
                containerPieno.style.display = 'none';
                containerVuoto.style.display = 'block';
                return;
            }

            const lista = document.getElementById('lista-articoli');
            lista.innerHTML = '';
            let sub = 0;

            carrello.forEach((item, i) => {
                sub += parseFloat(item.prezzo) * item.quantita;
                lista.innerHTML += `
                    <div class="item">
                        <img src="${item.immagine}" alt="">
                        <div class="item-info">
                            <h4>${item.nome}</h4>
                            <p>Quantità: ${item.quantita} • <b>€${item.prezzo}</b></p>
                            <button class="remove-btn" onclick="rimuovi(${i})">Rimuovi articolo</button>
                        </div>
                    </div>`;
            });

            document.getElementById('sub-tot').innerText = '€' + sub.toFixed(2);
            document.getElementById('tot-finale').innerText = '€' + (sub + 9.99).toFixed(2);
        }

        function rimuovi(index) {
            let carrello = JSON.parse(localStorage.getItem('carrello'));
            carrello.splice(index, 1);
            localStorage.setItem('carrello', JSON.stringify(carrello));
            render();
        }

        function checkout() { alert('Ordine ricevuto! Ti contatteremo per il restauro.'); localStorage.clear(); window.location.href='index.html'; }
        
        render();
    </script>
</body>
</html>
